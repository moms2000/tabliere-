version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: tabliereci_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       tabliereci
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tabliereci_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
