services:
  - type: web
    name: tabliereci-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: tabliereci-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 2h
      - key: JWT_REFRESH_IN
        value: 30d
      - key: APP_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ORANGE_MONEY_API_KEY
        sync: false
      - key: MTN_MOMO_API_KEY
        sync: false
      - key: WAVE_API_KEY
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_ID
        sync: false

databases:
  - name: tabliereci-db
    databaseName: tabliereci
    user: tabliereci
    plan: free
